name: E2E

on:
  push:
    branches: [main]
  pull_request:

jobs:
  e2e:
    runs-on: ubuntu-latest
    timeout-minutes: 25

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: mezon
          POSTGRES_PASSWORD: mezon
          POSTGRES_DB: mezon_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U mezon"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

    env:
      DATABASE_URL: postgresql://mezon:mezon@localhost:5432/mezon_test
      AUTH_SECRET: e2e-only-secret-never-production
      AUTH_URL: http://localhost:3000
      E2E_TEST: "1"

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Apply database migrations
        run: npm run db:migrate

      - name: Build
        run: npm run build

      - name: Run E2E tests
        run: npx playwright test

      - name: Upload report on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report
          retention-days: 7
